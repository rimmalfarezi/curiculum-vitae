<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tempat Kumpul Sigma</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:system-ui,sans-serif;
overflow:hidden;
height:100vh;
background:linear-gradient(#f7d8a3,#7b5538 45%,#24160f);
color:white;
}
#bg,#particles{position:fixed;inset:0}
#bg{overflow:hidden}
.layer{
position:absolute;inset:-5%;
background-repeat:no-repeat;
background-size:cover;
transition:transform .15s linear;
}
.layer1{
background:
radial-gradient(circle at 20% 20%,rgba(255,220,120,.35),transparent 15%),
radial-gradient(circle at 80% 25%,rgba(255,220,120,.25),transparent 15%);
filter:blur(2px);
}
.layer2{
background:
linear-gradient(transparent 70%,rgba(0,0,0,.15)),
repeating-linear-gradient(90deg,#6d4b2f 0 120px,#7a5536 120px 240px);
opacity:.15;
}
.lantern{
position:absolute;
top:40px;
font-size:60px;
animation:swing 4s ease-in-out infinite;
filter:drop-shadow(0 0 20px gold);
}
.left{left:10%}
.right{right:10%;animation-delay:-2s}
@keyframes swing{
0%,100%{transform:rotate(-5deg)}
50%{transform:rotate(5deg)}
}
.panel{
position:relative;
z-index:5;
width:min(900px,92%);
margin:4vh auto;
padding:30px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(10px);
border-radius:30px;
border:1px solid rgba(255,255,255,.2);
}
.logo{
font-size:clamp(2.2rem,6vw,5rem);
font-weight:900;
text-align:center;
text-shadow:0 0 20px rgba(255,220,120,.5);
animation:float 4s ease-in-out infinite;
}
@keyframes float{
50%{transform:translateY(-8px)}
}
.subtitle{text-align:center;opacity:.9;margin:10px 0 25px}
.links{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
}
.btn{
padding:18px;
border-radius:18px;
text-decoration:none;
color:white;
text-align:center;
background:linear-gradient(180deg,#a17248,#744d31);
transition:.25s;
}
.btn:hover{
transform:translateY(-8px) scale(1.03);
box-shadow:0 0 25px rgba(255,220,120,.5);
}
.notice{
margin-top:20px;
padding:18px;
border-left:4px solid gold;
background:rgba(255,255,255,.08);
}
</style>
</head>
<body>

<div id="bg">
<div class="layer layer1"></div>
<div class="layer layer2"></div>
<div class="lantern left">🏮</div>
<div class="lantern right">🏮</div>
</div>

<canvas id="particles"></canvas>

<div class="panel">
<div class="logo">TEMPAT KUMPUL SIGMA</div>
<div class="subtitle">Guild Hall Indonesia • Anime Tavern Edition</div>

<div class="links">
<a class="btn" href="#">🎮 Join Discord</a>
<a class="btn" href="#">📱 Join WhatsApp</a>
<a class="btn" href="#">🎵 TikTok</a>
<a class="btn" href="#">📜 Rules & Roles</a>
</div>

<div class="notice">
⚔️ Selamat datang petualang. Ambil role, baca rules, lalu bergabung dengan anggota guild lainnya.
</div>
</div>

<script>
const layers=document.querySelectorAll('.layer');
document.addEventListener('mousemove',e=>{
const x=(e.clientX/window.innerWidth-.5);
const y=(e.clientY/window.innerHeight-.5);
layers[0].style.transform=`translate(${x*20}px,${y*20}px)`;
layers[1].style.transform=`translate(${x*40}px,${y*40}px)`;
});

const c=document.getElementById('particles');
const ctx=c.getContext('2d');
function rs(){c.width=innerWidth;c.height=innerHeight}
rs();addEventListener('resize',rs);

const p=[];
for(let i=0;i<120;i++){
p.push({x:Math.random()*innerWidth,y:Math.random()*innerHeight,vx:(Math.random()-.5)*.2,vy:Math.random()*.5+.2,r:Math.random()*3+1,a:Math.random()});
}
function loop(){
ctx.clearRect(0,0,c.width,c.height);
for(const f of p){
f.x+=f.vx; f.y-=f.vy;
if(f.y<0){f.y=innerHeight;f.x=Math.random()*innerWidth;}
f.a+=0.03;
ctx.beginPath();
ctx.arc(f.x,f.y,f.r,0,6.28);
ctx.fillStyle=`rgba(255,230,140,${0.3+Math.sin(f.a)*0.3})`;
ctx.fill();
}
requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
